<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Dashboard | Krishna Readymade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin-products.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">Krishna<span>.</span></a>
  <nav class="topnav">
    <a href="/shop/">Shop</a>
    <a href="/admin/">Django Admin</a>
  </nav>
</header>

<main class="admin-shell">
  <section class="toolbar" aria-label="Product controls">
    <div>
      <p class="eyebrow">Store backend</p>
      <h1>Products</h1>
    </div>
    <div class="toolbar-actions">
      <button class="secondary-btn" type="button" id="refreshBtn">Refresh</button>
      <button class="primary-btn" type="button" id="newProductBtn">New Product</button>
    </div>
  </section>

  <section class="filters" aria-label="Product filters">
    <label>
      Search
      <input id="searchInput" type="search" placeholder="Name">
    </label>
    <label>
      Category
      <select id="categoryFilter">
        <option value="all">All categories</option>
        <option value="tshirts">T-Shirts</option>
        <option value="shirts">Shirts</option>
        <option value="jeans">Jeans</option>
        <option value="jackets">Jackets</option>
      </select>
    </label>
    <label>
      Badge
      <select id="badgeFilter">
        <option value="all">All badges</option>
        <option value="">None</option>
        <option value="new">New</option>
        <option value="trending">Trending</option>
      </select>
    </label>
    <label class="check-row">
      <input id="includeInactive" type="checkbox" checked>
      Show inactive
    </label>
  </section>

  <div class="status-row">
    <span id="statusText">Loading products...</span>
    <span id="countText"></span>
  </div>

  <section class="content-grid">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Badge</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productRows"></tbody>
      </table>
      <div class="empty-state" id="emptyState" hidden>No products found.</div>
    </div>

    <aside class="editor" aria-label="Product editor">
      <div class="editor-head">
        <h2 id="formTitle">New Product</h2>
        <button class="link-btn" type="button" id="clearFormBtn">Clear</button>
      </div>
      <form id="productForm" enctype="multipart/form-data">
        <input type="hidden" id="productId">
        <label>
          Name
          <input id="nameInput" name="name" type="text" required maxlength="200">
        </label>
        <label>
          Slug
          <input id="slugInput" name="slug" type="text" maxlength="220" placeholder="Auto-generated when blank">
        </label>
        <div class="form-grid">
          <label>
            Category
            <select id="categoryInput" name="category">
              <option value="tshirts">T-Shirts</option>
              <option value="shirts">Shirts</option>
              <option value="jeans">Jeans</option>
              <option value="jackets">Jackets</option>
            </select>
          </label>
          <label>
            Badge
            <select id="badgeInput" name="badge">
              <option value="">None</option>
              <option value="new">New</option>
              <option value="trending">Trending</option>
            </select>
          </label>
        </div>
        <label>
          Price
          <input id="priceInput" name="price" type="number" min="0" step="1" required>
        </label>
        <div class="form-grid">
          <label>
            Icon
            <input id="iconInput" name="icon" type="text" maxlength="10" value="T">
          </label>
          <label>
            Emoji
            <input id="emojiInput" name="emoji" type="text" maxlength="10" value="K">
          </label>
        </div>
        <label>
          Card background
          <select id="bgInput" name="bg">
            <option value="p-bg-1">p-bg-1</option>
            <option value="p-bg-2">p-bg-2</option>
            <option value="p-bg-3">p-bg-3</option>
            <option value="p-bg-4">p-bg-4</option>
          </select>
        </label>
        <label>
          Product image
          <input id="imageInput" name="image" type="file" accept="image/*">
        </label>
        <div class="image-preview" id="imagePreview" hidden></div>
        <label class="check-row">
          <input id="activeInput" name="is_active" type="checkbox" checked>
          Active on storefront
        </label>
        <div id="formErrors" class="form-errors" hidden></div>
        <button class="primary-btn wide-btn" type="submit">Save Product</button>
      </form>
    </aside>
  </section>
</main>

<script src="/js/admin-products.js" defer></script>
</body>
</html>
