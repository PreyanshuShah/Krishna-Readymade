<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Krishna Readymade clothing rack</title>
  <desc id="desc">A clothing rack with shirts, t-shirts, shoes and accessories.</desc>
  <defs>
