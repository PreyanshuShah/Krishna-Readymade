{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Error | Krishna Readymade{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/auth.css' %}?v=2">
</head>
<body>
<main class="auth-shell">
  <section class="auth-panel error-panel">
    <a class="auth-brand" href="{% url 'home' %}">Krishna Readymade</a>
    <p class="error-code">{% block code %}{% endblock %}</p>
    <h1>{% block heading %}{% endblock %}</h1>
    <p class="auth-copy">{% block copy %}{% endblock %}</p>
    <div class="error-actions">
      <a class="auth-action" href="{% url 'home' %}">Go Home</a>
      <a class="auth-action secondary" href="{% url 'shop' %}">Open Shop</a>
    </div>
  </section>
</main>
</body>
</html>
