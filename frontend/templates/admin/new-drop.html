{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>New Drop Admin | Krishna Readymade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/admin-products.css' %}?v=8">
</head>
<body>
<div class="admin-layout">
  {% include "admin/_sidenav.html" %}

  <main class="admin-shell">
    <section class="section-card drop-editor" aria-label="New drop editor">
      <div class="section-card-head">
        <div>
          <p class="eyebrow">Homepage feature</p>
          <h1>New Drop Details</h1>
          <p class="section-copy">This content appears on the home page and New Drop page.</p>
        </div>
        <a class="secondary-btn inline-link-btn" href="{% url 'new_drop' %}">View Page</a>
      </div>
      <form id="newDropForm" enctype="multipart/form-data">
        <div class="panel-grid">
          <div class="form-panel">
            <h3>Campaign Copy</h3>
            <label>
              Title
              <textarea id="dropTitleInput" name="title" rows="2" required></textarea>
            </label>
            <label>
              Description
              <textarea id="dropDescriptionInput" name="description" rows="3" required></textarea>
            </label>
            <label>
              Features
              <textarea id="dropFeaturesInput" name="features" rows="4" required placeholder="One feature per line"></textarea>
            </label>
          </div>
          <div class="form-panel">
            <h3>Display Settings</h3>
            <div class="drop-form-grid compact-grid">
              <label>
                Season
                <input id="dropSeasonInput" name="season" type="text" maxlength="120" required>
              </label>
              <label>
                Season code
                <input id="dropSeasonCodeInput" name="season_code" type="text" maxlength="40" required>
              </label>
              <label>
                Badge
                <input id="dropBadgeInput" name="badge" type="text" maxlength="80" required>
              </label>
              <label>
                Visual number
                <input id="dropVisualNumberInput" name="visual_number" type="text" maxlength="20" required>
              </label>
              <label>
                Icon
                <input id="dropIconInput" name="icon" type="text" maxlength="10" required>
              </label>
              <label>
                Button text
                <input id="dropButtonTextInput" name="button_text" type="text" maxlength="80" required>
              </label>
            </div>
            <label>
              Button URL
              <input id="dropButtonUrlInput" name="button_url" type="text" maxlength="200" placeholder="Leave blank for shop page">
            </label>
            <label>
              Drop image
              <input id="dropImageInput" name="image" type="file" accept="image/*">
            </label>
            <div class="image-preview" id="dropImagePreview" hidden></div>
          </div>
        </div>
        <div class="form-footer">
          <label class="check-row">
            <input id="dropActiveInput" name="is_active" type="checkbox" checked>
            Active on New Drop page
          </label>
          <div id="dropStatusText" class="inline-status">Loading New Drop details...</div>
          <button class="primary-btn" type="submit">Save New Drop Details</button>
        </div>
        <div id="dropFormErrors" class="form-errors" hidden></div>
      </form>
    </section>
  </main>
</div>

<script src="{% static 'js/admin-products.js' %}?v=9" defer></script>
</body>
</html>
