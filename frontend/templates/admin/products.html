{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>Products Admin | Krishna Readymade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/admin-products.css' %}?v=9">
</head>
<body>
<div class="admin-layout">
  {% include "admin/_sidenav.html" %}

  <main class="admin-shell">
    <section class="section-card products-section" aria-label="Product manager">
      <div class="section-card-head">
        <div>
          <p class="eyebrow">Catalog</p>
          <h1>Product Manager</h1>
          <p class="section-copy">Search, edit, publish, hide, or delete products from the storefront.</p>
        </div>
        <div class="toolbar-actions">
          <button class="secondary-btn" type="button" id="refreshBtn">Refresh</button>
          <a class="primary-btn inline-link-btn" href="{% url 'admin_product_add' %}">New Product</a>
        </div>
      </div>

      <div class="product-status-strip">
        <span id="statusText">Loading products...</span>
        <strong id="countText">Loading...</strong>
      </div>

      <section class="filters" aria-label="Product filters">
        <label>
          Search
          <input id="searchInput" type="search" placeholder="Name">
        </label>
        <label>
          Category
          <select id="categoryFilter">
            <option value="all">All categories</option>
            {% for value, label in category_choices %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
          </select>
        </label>
        <label>
          Badge
          <select id="badgeFilter">
            <option value="all">All badges</option>
            {% for value, label in badge_choices %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
          </select>
        </label>
        <label class="check-row">
          <input id="includeInactive" type="checkbox" checked>
          Show inactive
        </label>
      </section>

      <section class="list-grid">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Badge</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productRows"></tbody>
          </table>
          <div class="empty-state" id="emptyState" hidden>No products found.</div>
        </div>
      </section>
    </section>
  </main>
</div>

<script src="{% static 'js/admin-products.js' %}?v=10" defer></script>
</body>
</html>
